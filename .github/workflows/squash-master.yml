name: Keep master as a single clean commit

# Runs automatically every time anything is pushed to master.
# Squashes all history into one clean snapshot commit so master
# always stays tidy. Safe to push from VS or any tool — history
# is cleaned up behind the scenes each time.
#
# Note: GITHUB_TOKEN pushes do NOT re-trigger this workflow,
# so there is no infinite loop risk.
on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  squash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master (full history)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check commit count
        id: count
        run: echo "total=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Already a single commit — nothing to do
        if: steps.count.outputs.total == '1'
        run: echo "master already has exactly 1 commit."

      - name: Squash all commits into one clean snapshot
        if: steps.count.outputs.total != '1'
        run: |
          # Save the latest commit message; fall back to a default if empty
          git log -1 --pretty=%B | grep -q '[^[:space:]]' \
            && git log -1 --pretty=%B > /tmp/commit-message.txt \
            || echo "Latest source snapshot" > /tmp/commit-message.txt

          # Create an orphan branch with no history, containing all current files
          git checkout --orphan clean-snapshot
          git add -A
          git commit -F /tmp/commit-message.txt

          # Force-push as master — this does NOT re-trigger the workflow
          git push origin clean-snapshot:master --force
          echo "Done — master now has 1 clean commit."
